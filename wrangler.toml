# Cloudflare Workers static-assets config for The Stable (the agent-facing witness/gate suite).
# This project deploys as a Worker (workers.dev domain), not Pages, so it needs the [assets]
# form rather than pages_build_output_dir — that key only takes effect for a Pages-type project
# and was silently ignored here, which is why the first deploy served an empty worker (404 on
# everything). Only public/ is served; stable/, witness-suite/, bridge/, and experiments/ stay
# in the repo but are NOT deployed. No secrets here — auth is your `wrangler login` or the
# CLOUDFLARE_API_TOKEN env var, which you set and I never see.
name = "the-stable"
compatibility_date = "2026-07-18"

[assets]
directory = "public"
